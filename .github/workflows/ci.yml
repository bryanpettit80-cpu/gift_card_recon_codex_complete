name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        working-directory: _program
        run: python -m pip install -e ".[dev]"
      - name: Run tests
        working-directory: _program
        run: python -m pytest -q

  windows-smoke:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Install package
        working-directory: _program
        run: python -m pip install -e ".[dev]"
      - name: Validate PowerShell and operator wrappers
        shell: pwsh
        run: |
          $parseFailures = @()
          Get-ChildItem -LiteralPath . -Recurse -File -Filter *.ps1 | ForEach-Object {
            $tokens = $null
            $errors = $null
            [void][System.Management.Automation.Language.Parser]::ParseFile(
              $_.FullName,
              [ref]$tokens,
              [ref]$errors
            )
            foreach ($parseError in $errors) {
              $parseFailures += "$($_.FullName):$($parseError.Extent.StartLineNumber): $($parseError.Message)"
            }
          }
          if ($parseFailures.Count -gt 0) {
            throw "PowerShell parse failures:`n$($parseFailures -join "`n")"
          }

          $wrappers = @(
            @{
              Path = "templates\Run Weekly Gift Card Reconciliation.cmd"
              Runner = "_program\run_weekly.ps1"
            },
            @{
              Path = "templates\Run Monthly Gift Card Close.cmd"
              Runner = "_program\run_monthly_close.ps1"
            },
            @{
              Path = "templates\Check Gift Card Reconciliation Health.cmd"
              Runner = "_program\check_operator_health.ps1"
            }
          )
          foreach ($wrapper in $wrappers) {
            $content = Get-Content -LiteralPath $wrapper.Path -Raw
            foreach ($required in @(
              "OPERATIONS_ROOT=%~dp0.",
              "-OperationsRoot",
              "powershell.exe",
              "pwsh.exe",
              "exit /b %EXITCODE%"
            )) {
              if (-not $content.Contains($required)) {
                throw "$($wrapper.Path) is missing required launcher contract: $required"
              }
            }
            if (-not $content.Contains($wrapper.Runner)) {
              throw "$($wrapper.Path) does not invoke $($wrapper.Runner)."
            }
          }
      - name: Run PowerShell migration fixtures
        shell: pwsh
        run: ./_program/maintenance/test_migrate_to_numbered_layout.ps1
      - name: Run PowerShell operator-tooling fixtures
        shell: pwsh
        run: ./_program/maintenance/test_operator_tooling.ps1
      - name: Run unit tests with Excel PDF automation mocked
        working-directory: _program
        shell: pwsh
        run: >-
          python -m pytest -q
          --ignore=tests/test_windows_pdf_integration.py
          --basetemp="$env:RUNNER_TEMP\gc-recon-pytest"
